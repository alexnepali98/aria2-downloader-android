name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build APK
      run: bash build.sh

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: app/build/outputs/apk/debug/*.apk
